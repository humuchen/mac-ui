<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0"
    />
    <title>Mac UI - Dev</title>
    <script type="module" src="/src/mac-ui.ts"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 32px 16px;
      }
      h1 {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 8px;
        background: linear-gradient(135deg, #5ac8fa, #007aff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .subtitle {
        font-size: 14px;
        color: #8e8ea0;
        margin-bottom: 32px;
      }
    </style>
  </head>
  <body>
    <h1>Mac UI</h1>
    <p class="subtitle">macOS 风格组件库</p>

    <mac-config-provider theme="light">
      <mac-button>Light Theme Button</mac-button>
      <mac-input placeholder="Light Theme Input"></mac-input>
      <mac-number-animation to="10"></mac-number-animation>
    </mac-config-provider>

    <mac-config-provider theme="dark">
      <mac-button>Dark Theme Button</mac-button>
      <mac-input placeholder="Dark Theme Input"></mac-input>
      <mac-number-animation to="100"></mac-number-animation>
    </mac-config-provider>

    <mac-button>No Provider Button</mac-button>
  </body>
</html>
