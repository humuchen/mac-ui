<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mac UI - Build Test</title>
    <script type="module">
      import { MacConfigProvider, MacButton, MacInput } from './dist/mac-ui.es.js'
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 32px 16px;
      }
    </style>
  </head>
  <body>
    <h2>Light Theme</h2>
    <mac-config-provider theme="light">
      <mac-button>Light Button</mac-button>
      <mac-input placeholder="Light Input"></mac-input>
    </mac-config-provider>

    <h2>Dark Theme</h2>
    <mac-config-provider theme="dark">
      <mac-button>Dark Button</mac-button>
      <mac-input placeholder="Dark Input"></mac-input>
    </mac-config-provider>
  </body>
</html>
